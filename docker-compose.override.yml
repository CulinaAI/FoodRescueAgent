services:
  # FastAPI agent — owns the rescue pipeline (intent → vision → risk → plan → reply)
  # and all DB writes. Internal only; the .NET proxy / monitor reach it by service name.
  food-rescue-agent:
    build:
      context: ./apps/food_rescue_agent
      dockerfile: Dockerfile
    env_file:
      - ./apps/food_rescue_agent/.env
    environment:
      # DB lives on the shared volume so the HITL dashboard sees the same data.
      DATABASE_URL: sqlite:////app/data/fra1.db
      # Vertex AI (ADC auth) — mirrors the .NET backend; no API key needed.
      GOOGLE_GENAI_USE_VERTEXAI: "true"
      GOOGLE_CLOUD_PROJECT: culinaai-backend
      GOOGLE_CLOUD_LOCATION: europe-west3
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp_adc.json
      FRA_GEMINI_MODEL: gemini-3.5-flash
    volumes:
      - fra1_data:/app/data
      # Same service-account ADC the backend uses (already has Vertex AI access).
      - ./gcp_adc.json:/run/secrets/gcp_adc.json:ro
    # internal only — no external port exposed
    networks:
      - backend
    restart: unless-stopped

  # Reddit monitor — long-running stream worker (PRIMARY channel). Stateless: it does
  # NOT touch the DB; it only POSTs detected food-rescue posts to the agent's /analyze.
  reddit-monitor:
    build:
      context: ./apps/food_rescue_agent
      dockerfile: Dockerfile
    command: ["python", "connectors/reddit_monitor.py"]
    env_file:
      - ./apps/food_rescue_agent/.env
    environment:
      FOOD_RESCUE_AGENT_URL: http://food-rescue-agent:8080
    depends_on:
      - food-rescue-agent
    networks:
      - backend
    restart: unless-stopped

  # HITL moderation dashboard (Streamlit) — moderators review the queue and approve/edit.
  # Shares the agent's DB via the fra1_data volume. With REDDIT_POST_ENABLED=false (default)
  # approving does NOT auto-post; the reply is shown for manual copy.
  # SECURITY: the dashboard has no auth and authorizes public Reddit posting. It is
  # internal-only (no published port) — reach it via SSH tunnel
  # (`ssh -L 8501:hitl-dashboard:8501 …`) or front it with Caddy basic_auth before exposing.
  hitl-dashboard:
    build:
      context: ./apps/food_rescue_agent
      dockerfile: Dockerfile
    command: ["streamlit", "run", "hitl/dashboard.py", "--server.port=8501", "--server.address=0.0.0.0"]
    env_file:
      - ./apps/food_rescue_agent/.env
    environment:
      DATABASE_URL: sqlite:////app/data/fra1.db
    volumes:
      - fra1_data:/app/data
    expose:
      - "8501"
    depends_on:
      - food-rescue-agent
    networks:
      - backend
    restart: unless-stopped

volumes:
  fra1_data:
