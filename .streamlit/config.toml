# Streamlit theme for the Food Rescue HITL dashboard.
# Dark, fresh-green accent to match the "food rescue" brand.
[theme]
base = "dark"
primaryColor = "#34D399"
backgroundColor = "#0B0F14"
secondaryBackgroundColor = "#141B22"
textColor = "#E6EDF3"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
